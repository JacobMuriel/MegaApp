name: MegaApp

options:
  bundleIdPrefix: com.megaapp
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  xcodeVersion: "16.0"

# MegaApp.xcconfig supplies OPENAI_API_KEY (never committed — see README)
configFiles:
  Debug: MegaApp.xcconfig
  Release: MegaApp.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    # minimal suppresses unrelated strict-concurrency noise while keeping @MainActor checks
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  MegaApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      # Include all Swift files under MegaApp/; exclude plist/entitlements (handled separately)
      - path: MegaApp
        excludes:
          - "Resources/Info.plist"
          - "Resources/MegaApp.entitlements"
    resources:
      - path: MegaApp/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.megaapp.MegaApp
        INFOPLIST_FILE: MegaApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MegaApp/Resources/MegaApp.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Suppress warnings about missing provisioning during local sim builds
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
